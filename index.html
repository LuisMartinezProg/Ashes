<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="screen-orientation" content="landscape" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <title>Ashes of the Reborn</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Cinzel:wght@400;500;600&family=EB+Garamond:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/mochigo.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: var(--ash-deep);
      font-family: 'EB Garamond', serif;
      color: var(--text);
      cursor: default;
    }

    #particles {
      position: fixed; inset: 0;
      pointer-events: none;
      z-index: 0;
    }

    .vignette {
      position: fixed; inset: 0;
      background: radial-gradient(ellipse at center,
        transparent 30%,
        rgba(5,5,10,0.7) 80%,
        rgba(5,5,10,0.97) 100%);
      pointer-events: none;
      z-index: 1;
    }

    .screen {
      position: fixed; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      opacity: 0;
      pointer-events: none;
      z-index: 10;
      transition: opacity 0.05s;
    }
    .screen.active {
      opacity: 1;
      pointer-events: all;
    }

    #rotate-warning {
      position: fixed; inset: 0;
      background: #0F1E30;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 20px;
      z-index: 999;
      opacity: 0; pointer-events: none;
      transition: opacity 0.4s;
    }
    #rotate-warning.show { opacity: 1; pointer-events: all; }
    .rotate-icon {
      font-size: 2.8rem;
      animation: rotateAnim 1.5s ease-in-out infinite;
    }
    @keyframes rotateAnim {
      0%,100% { transform: rotate(0deg); }
      50%      { transform: rotate(90deg); }
    }
    .rotate-text {
      font-family: 'Cinzel', serif;
      font-size: 0.8rem; letter-spacing: 0.3em;
      color: #7B4FBF; text-align: center;
      text-transform: uppercase;
    }
    .rotate-sub {
      font-family: 'EB Garamond', serif;
      font-size: 0.9rem; color: rgba(123,79,191,0.5);
      text-align: center; font-style: italic;
    }

#screen-logo {
  background: #0d1e35;
}
    .studio-logo {
      display: flex; flex-direction: column;
      align-items: center; gap: 0;
      opacity: 0;
    }
    .studio-logo.reveal {
      animation: logoReveal 4.8s ease forwards;
    }
    @keyframes logoReveal {
      0%   { opacity: 0; transform: scale(0.94) translateY(6px); }
      18%  { opacity: 1; transform: scale(1) translateY(0); }
      72%  { opacity: 1; transform: scale(1); }
      100% { opacity: 0; transform: scale(1.02); }
    }
    .logo-emblem {
     width: min(480px, 88vw);
      height: auto;
      display: block;
      border-radius: 12px;
   }
    @media (orientation: portrait) {
      .logo-emblem { width: min(320px, 85vw); }
    }
    .studio-name, .studio-sub { display: none; }

    #screen-death { background: #07070F; }

    .rain-overlay {
      position: absolute; inset: 0;
      background: repeating-linear-gradient(
        180deg,
        transparent 0px, transparent 3px,
        rgba(100,120,160,0.025) 3px, rgba(100,120,160,0.025) 4px
      );
      animation: rainFall 0.35s linear infinite;
      opacity: 0;
      transition: opacity 1.8s;
    }
    .rain-overlay.visible { opacity: 1; }
    @keyframes rainFall {
      from { background-position: 0 0; }
      to   { background-position: 18px 72px; }
    }
    .street-glow {
      position: absolute; bottom: 0; left: 0; right: 0;
      height: 35%;
      background: linear-gradient(to top, rgba(50,70,110,0.12) 0%, transparent 100%);
      pointer-events: none;
    }
    .neon-flicker {
      position: absolute; top: 16%; right: 14%;
      width: 5px; height: 5px; border-radius: 50%;
      background: rgba(140,170,255,0.55);
      box-shadow: 0 0 18px 7px rgba(110,140,255,0.15);
      animation: flicker 4s steps(1) infinite;
    }
    @keyframes flicker {
      0%,17%,21%,24%,52%,56%,100% { opacity: 1; }
      19%,23%,54% { opacity: 0.25; }
    }

    #screen-limbo { background: #F2EEE4; }

    .limbo-fog {
      position: absolute; inset: 0;
      background: radial-gradient(ellipse 85% 65% at 50% 50%,
        rgba(255,255,255,0.96) 0%,
        rgba(228,222,210,0.88) 50%,
        rgba(195,188,175,0.72) 100%);
      animation: fogPulse 7s ease-in-out infinite;
    }
    @keyframes fogPulse {
      0%,100% { opacity: 0.88; transform: scale(1); }
      50%      { opacity: 1;   transform: scale(1.025); }
    }
    .limbo-light {
      position: absolute;
      width: 280px; height: 280px; border-radius: 50%;
      background: radial-gradient(circle, rgba(255,255,245,1) 0%, transparent 70%);
      top: 50%; left: 50%;
      transform: translate(-50%, -62%);
      filter: blur(45px);
      animation: lightFloat 9s ease-in-out infinite;
    }
    @keyframes lightFloat {
      0%,100% { transform: translate(-50%, -62%); opacity: 0.55; }
      50%      { transform: translate(-50%, -56%); opacity: 0.9; }
    }
    #screen-limbo .dialogue-box {
      background: rgba(240,235,220,0.92);
      border-color: rgba(120,100,60,0.25);
      border-top-color: rgba(120,100,60,0.55);
    }
    #screen-limbo .dialogue-box::before {
      background: linear-gradient(90deg, transparent, rgba(150,120,60,0.7), transparent);
    }
    #screen-limbo .dialogue-text { color: #28221A; }
    #screen-limbo .speaker-name  { color: #6A5020; }
    #screen-limbo .direction-text { color: #8A7850; }
    #screen-limbo .continue-hint { color: #9A8A60; }
    #screen-limbo .choice-btn {
      background: rgba(240,235,220,0.9);
      border-color: rgba(120,100,60,0.22);
      color: #2A2018;
    }
    #screen-limbo .choice-btn:hover { color: #6A5020; border-color: rgba(150,120,60,0.6); }
    #screen-limbo .choice-btn::before { background: #8A6830; }

    /* ══ SCREEN 4: MENU PRINCIPAL — Clorinde dominante ══ */
    #screen-menu { background: #080810; }

    @media (orientation: portrait) {
      #screen-menu .menu-layout {
        flex-direction: column;
        text-align: center;
      }
      #screen-menu .menu-left { border-right: none; border-bottom: 1px solid rgba(123,79,191,0.18); padding-bottom: 20px; }
      #screen-menu .menu-title { font-size: 1.6rem; }
      #screen-menu .menu-subtitle { font-size: 0.6rem; }
    }

    .menu-bg {
      position: absolute; inset: 0;
      background:
        radial-gradient(ellipse 55% 45% at 100% 100%,
          rgba(123,79,191,0.35) 0%, transparent 55%),
        radial-gradient(ellipse 45% 50% at 0% 0%,
          rgba(123,79,191,0.10) 0%, transparent 50%),
        radial-gradient(ellipse 60% 60% at 30% 70%,
          rgba(61,31,110,0.4) 0%, transparent 65%),
        linear-gradient(135deg, #080810 0%, #120A22 100%);
    }

    .menu-layout {
      position: relative; z-index: 2;
      display: flex; flex-direction: row;
      align-items: center;
      width: 100%; height: 100%;
      padding: 0 6vw;
      gap: 0;
    }

    .menu-left {
      flex: 1;
      display: flex; flex-direction: column;
      justify-content: center;
      padding-right: 5vw;
      border-right: 1px solid rgba(123,79,191,0.2);
    }

    .menu-right {
      flex: 0 0 auto;
      display: flex; flex-direction: column;
      justify-content: center;
      padding-left: 5vw;
      min-width: 200px;
    }

    .menu-title-wrap { position: relative; }

    .menu-title-bg {
      font-family: 'Cinzel Decorative', serif;
      font-size: clamp(1.4rem, 4.5vw, 4rem);
      font-weight: 900;
      color: transparent;
      -webkit-text-stroke: 1px #7B4FBF;
      position: absolute; top: 50%; left: 0;
      transform: translateY(-50%);
      white-space: nowrap;
      opacity: 0.12; pointer-events: none;
      filter: blur(2px);
    }
    .menu-title {
      font-family: 'Cinzel Decorative', serif;
      font-size: clamp(1.4rem, 4.5vw, 4rem);
      font-weight: 900;
      background: linear-gradient(120deg,
        #EDD47A 0%,
        #7B4FBF 45%,
        #3D1F6E 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      filter: drop-shadow(0 0 24px rgba(123,79,191,0.35));
      position: relative;
      line-height: 1.15;
    }
    .menu-subtitle {
      font-family: 'Cinzel', serif;
      font-size: clamp(0.52rem, 1vw, 0.72rem);
      letter-spacing: 0.4em;
      color: #B07FEF;
      margin-top: 14px;
      text-transform: uppercase;
    }
    .menu-divider {
      width: 120px; height: 1px;
      background: linear-gradient(90deg, #7B4FBF, transparent);
      margin: 20px 0;
      position: relative;
    }
    .menu-divider::before {
      content: '✦';
      position: absolute; top: 50%; left: 0;
      transform: translateY(-50%);
      color: #EDD47A; font-size: 0.6rem;
      background: #080810; padding-right: 8px;
    }
    .menu-studio {
      font-family: 'Cinzel', serif;
      font-size: 0.58rem; letter-spacing: 0.3em;
      color: #7B4FBF; opacity: 0.65;
      text-transform: uppercase;
    }

    .menu-options {
      display: flex; flex-direction: column;
      align-items: flex-start; gap: 2px;
    }
    .menu-btn {
      font-family: 'Cinzel', serif;
      font-size: clamp(0.82rem, 1.8vw, 0.95rem);
      letter-spacing: 0.18em;
      color: var(--text-dim);
      background: none; border: none;
      padding: 14px 0 14px 16px;
      cursor: pointer;
      position: relative;
      transition: color 0.2s, padding-left 0.2s;
      text-transform: uppercase;
      -webkit-tap-highlight-color: transparent;
      white-space: nowrap;
    }
    .menu-btn::before {
      content: '';
      position: absolute; left: 0; top: 50%;
      transform: translateY(-50%) scaleY(0);
      width: 2px; height: 60%;
      background: #7B4FBF;
      transition: transform 0.2s;
    }
    .menu-btn:active, .menu-btn:hover {
      color: #EDD47A; padding-left: 22px;
    }
    .menu-btn:active::before, .menu-btn:hover::before { transform: translateY(-50%) scaleY(1); }
    .menu-btn.primary {
      color: #B07FEF;
      font-size: clamp(0.9rem, 2vw, 1rem);
    }
    .menu-btn.primary:active, .menu-btn.primary:hover { color: #EDD47A; }
    .menu-version {
      position: absolute; bottom: 22px; right: 30px;
      font-family: 'Cinzel', serif; font-size: 0.58rem;
      letter-spacing: 0.2em; color: #7B4FBF; opacity: 0.5;
    }

    #skip-btn {
      position: fixed; top: 14px; right: 16px;
      font-family: 'Cinzel', serif;
      font-size: 0.65rem; letter-spacing: 0.25em;
      color: #7B4FBF;
      background: rgba(8,8,14,0.7);
      border: 1px solid rgba(123,79,191,0.3);
      padding: 8px 16px;
      cursor: pointer; z-index: 200;
      opacity: 0; pointer-events: none;
      transition: opacity 0.4s, color 0.2s, border-color 0.2s;
    }
    #skip-btn.visible { opacity: 1; pointer-events: all; }
    #skip-btn:active { color: #EDD47A; border-color: rgba(123,79,191,0.6); }

    .cinematic-area {
      position: absolute;
      top: 0; left: 0; right: 0;
      bottom: 28vh;
      display: flex; align-items: center; justify-content: center;
      overflow: hidden;
    }
    .cinematic-placeholder {
      width: 100%; height: 100%;
      background: linear-gradient(180deg,
        rgba(10,13,20,0.0) 0%,
        rgba(10,13,20,0.6) 100%);
    }

    .dialogue-box {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      width: 100%;
      background: rgba(6,6,12,0.95);
      border-top: 2px solid rgba(123,79,191,0.5);
      border-bottom: none;
      padding: 14px 20px 12px;
      backdrop-filter: blur(12px);
      opacity: 0;
      transition: opacity 0.5s;
      min-height: 26vh;
      max-height: 30vh;
      display: flex; flex-direction: column; justify-content: center;
    }
    @media (orientation: landscape) {
      .dialogue-box { min-height: 32vh; max-height: 36vh; padding: 10px 28px 10px; }
      .cinematic-area { bottom: 34vh; }
    }
    .dialogue-box.visible { opacity: 1; }
    .dialogue-box::before {
      content: '';
      position: absolute; top: 0; left: 0; right: 0; height: 1px;
      background: linear-gradient(90deg, transparent, #7B4FBF, transparent);
    }
    .speaker-name {
      font-family: 'Cinzel', serif;
      font-size: 0.75rem; letter-spacing: 0.28em;
      color: #B07FEF; text-transform: uppercase;
      margin-bottom: 6px; min-height: 1em;
    }
    .dialogue-text {
      font-family: 'EB Garamond', serif;
      font-size: 1.05rem;
      line-height: 1.6; color: var(--text);
      min-height: 1.8em;
    }
    @media (orientation: landscape) {
      .dialogue-text { font-size: 1rem; }
    }
    .direction-text {
      font-family: 'EB Garamond', serif;
      font-style: italic;
      font-size: 0.95rem;
      color: var(--text-dim); line-height: 1.55;
      min-height: 1.6em;
    }
    .continue-hint {
      text-align: right; margin-top: 8px;
      font-family: 'Cinzel', serif; font-size: 0.6rem;
      letter-spacing: 0.28em; color: #7B4FBF;
      opacity: 0; transition: opacity 0.4s;
      animation: blink 2s ease-in-out infinite;
    }
    .continue-hint.visible { opacity: 1; }
    @keyframes blink {
      0%,100% { opacity: 0.35; } 50% { opacity: 0.9; }
    }

    .choice-box {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      width: 100%;
      display: flex; flex-direction: column; gap: 0;
      opacity: 0; pointer-events: none;
      transition: opacity 0.5s;
      background: rgba(6,6,12,0.95);
      border-top: 2px solid rgba(123,79,191,0.5);
    }
    .choice-box.visible { opacity: 1; pointer-events: all; }

    .choice-label {
      font-family: 'Cinzel', serif;
      font-size: 0.65rem; letter-spacing: 0.3em;
      color: #7B4FBF; text-transform: uppercase;
      padding: 10px 20px 4px;
    }

    .choice-btn {
      font-family: 'EB Garamond', serif;
      font-size: 1rem;
      letter-spacing: 0.04em; color: var(--text);
      background: transparent;
      border: none;
      border-top: 1px solid rgba(123,79,191,0.15);
      padding: 14px 24px; cursor: pointer;
      text-align: left;
      transition: all 0.18s;
      position: relative; overflow: hidden;
      -webkit-tap-highlight-color: rgba(123,79,191,0.15);
    }
    .choice-btn:first-of-type { border-top: 1px solid rgba(123,79,191,0.2); }
    .choice-btn::before {
      content: '';
      position: absolute; left: 0; top: 0; bottom: 0;
      width: 3px; background: #7B4FBF;
      transform: scaleY(0); transition: transform 0.18s;
    }
    .choice-btn:active {
      background: rgba(123,79,191,0.08);
      color: #EDD47A; padding-left: 32px;
    }
    .choice-btn:active::before { transform: scaleY(1); }

    #flash {
      position: fixed; inset: 0; background: #fff;
      opacity: 0; pointer-events: none; z-index: 100;
    }
    #fade {
      position: fixed; inset: 0; background: #04040A;
      opacity: 1; pointer-events: none; z-index: 50;
      transition: opacity 1.2s ease;
    }
    #fade.clear { opacity: 0; }

    .ripple {
      position: fixed; border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.5);
      transform: scale(0); pointer-events: none; z-index: 99;
      animation: rippleOut 0.65s ease-out forwards;
    }
    @keyframes rippleOut { to { transform: scale(9); opacity: 0; } }

    #audio-note {
      position: fixed; bottom: 18px; left: 50%;
      transform: translateX(-50%);
      font-family: 'Cinzel', serif; font-size: 0.58rem;
      letter-spacing: 0.28em; color: #7B4FBF;
      opacity: 0; transition: opacity 1.2s; z-index: 200;
      white-space: nowrap;
    }
    #audio-note.show { opacity: 0.45; }
  </style>
</head>
<body>

<div id="rotate-warning">
  <div class="rotate-icon">📱</div>
  <div class="rotate-text">Gira tu dispositivo</div>

</div>

<canvas id="particles"></canvas>
<div class="vignette"></div>
<div id="flash"></div>
<div id="fade"></div>

<div class="screen" id="screen-logo">
  <div class="studio-logo" id="studioLogo">
    <img src="valiant.png" class="logo-emblem" alt="Valiant Gaming" />
  </div>
</div>

<button id="skip-btn" onclick="skipToMenu()">SALTAR ›</button>

<div class="screen" id="screen-death">

  </div>

  </div>
  <div class="dialogue-box" id="limbo-dialogue">

<script>
  window.onerror = (msg, src, line) => {
  document.body.innerHTML = `<div style="color:red;padding:20px;font-family:monospace;font-size:14px;">
    ERROR: ${msg}<br>Línea: ${line}
  </div>`;
};

const canvas = document.getElementById('particles');
const ctx    = canvas.getContext('2d');

function resizeCanvas() {
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

class Particle {
  constructor() { this.reset(true); }
  reset(random) {
    this.x    = Math.random() * canvas.width;
    this.y    = random ? Math.random() * canvas.height : -5;
    this.size = Math.random() * 1.4 + 0.3;
    this.vx   = (Math.random() - 0.5) * 0.06;
    this.vy   = Math.random() * 0.18 + 0.05;
    this.maxL = Math.random() * 280 + 160;
    this.life = random ? Math.random() * this.maxL : 0;
    this.hue  = 260;
  }
  update() {
    this.x += this.vx; this.y += this.vy; this.life++;
    if (this.life > this.maxL || this.y > canvas.height + 4) this.reset(false);
  }
  draw() {
    const p = this.life / this.maxL;
    const a = p < 0.12 ? p/0.12 : p > 0.78 ? (1-p)/0.22 : 1;
    ctx.save();
    ctx.globalAlpha = a * 0.35;
    ctx.fillStyle = `hsl(${this.hue},40%,72%)`;
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size, 0, Math.PI*2);
    ctx.fill();
    ctx.restore();
  }
}

const parts = Array.from({length:140}, () => new Particle());
(function loop() { ctx.clearRect(0,0,canvas.width,canvas.height); parts.forEach(p=>{p.update();p.draw();}); requestAnimationFrame(loop); })();

const SCREENS = {
  logo:  document.getElementById('screen-logo'),
  death: document.getElementById('screen-death'),
  limbo: document.getElementById('screen-limbo'),
  menu:  document.getElementById('screen-menu'),
};

function showScreen(id) {
  Object.values(SCREENS).forEach(s => s.classList.remove('active'));
  if (id && SCREENS[id]) SCREENS[id].classList.add('active');
}

const fadeEl = document.getElementById('fade');
function fadeIn(cb, ms=1200) {
  fadeEl.style.transition = 'none';
  fadeEl.style.opacity = '1';
  fadeEl.classList.remove('clear');
  requestAnimationFrame(() => requestAnimationFrame(() => {
    fadeEl.style.transition = `opacity ${ms}ms ease`;
    fadeEl.style.opacity = '0';
    setTimeout(() => { fadeEl.classList.add('clear'); cb&&cb(); }, ms);
  }));
}
function fadeOut(cb, ms=1000) {
  fadeEl.classList.remove('clear');
  fadeEl.style.transition = `opacity ${ms}ms ease`;
  fadeEl.style.opacity = '1';
  setTimeout(() => cb&&cb(), ms);
}

const flashEl = document.getElementById('flash');
function gunFlash(cb) {
  flashEl.style.transition = 'none';
  flashEl.style.opacity = '1';
  const r = Object.assign(document.createElement('div'), { className:'ripple' });
  Object.assign(r.style, { width:'50px', height:'50px', top:'44%', left:'47%', marginLeft:'-25px', marginTop:'-25px' });
  document.body.appendChild(r);
  setTimeout(() => r.remove(), 750);
  requestAnimationFrame(() => requestAnimationFrame(() => {
    flashEl.style.transition = 'opacity 0.85s ease';
    flashEl.style.opacity = '0';
    setTimeout(() => cb&&cb(), 950);
  }));
}

function typewrite(el, text, speed, cb) {
  el.textContent = '';
  let i = 0;
  const t = setInterval(() => {
    el.textContent += text[i++];
    if (i >= text.length) { clearInterval(t); cb&&setTimeout(cb,250); }
  }, speed||26);
  return t;
}

let seq = [], step = 0, waiting = false, onSeqDone = null;
let choiceCb = null;

function runSeq(sequence, done) {
  seq = sequence; step = 0; waiting = false; onSeqDone = done;
  nextStep();
}

function nextStep() {
  if (step >= seq.length) { onSeqDone&&onSeqDone(); return; }
  const s = seq[step];

  if (s.type === 'dir' || s.type === 'line') {
    const box  = document.getElementById(s.box+'-dialogue');
    const spk  = document.getElementById(s.box+'-speaker');
    const dir  = document.getElementById(s.box+'-dir');
    const txt  = document.getElementById(s.box+'-text');
    const hint = document.getElementById(s.box+'-hint');

    box.classList.add('visible');
    hint.classList.remove('visible');

    if (s.type === 'dir') {
      spk.textContent = '';
      txt.textContent = '';
      typewrite(dir, s.text, 20, () => { waiting = true; hint.classList.add('visible'); });
    } else {
      dir.textContent = '';
      spk.textContent = (s.speaker||'').toUpperCase();
      typewrite(txt, '— '+s.text, 25, () => { waiting = true; hint.classList.add('visible'); });
    }
  }

  else if (s.type === 'action') {
    s.fn(() => { step++; nextStep(); });
  }

  else if (s.type === 'choice') {
    document.getElementById(s.box+'-dialogue').classList.remove('visible');
    const cbox = document.getElementById(s.box+'-choices');
    cbox.classList.add('visible');
    choiceCb = (choice) => {
      cbox.classList.remove('visible');
      choiceCb = null;
      if (s.branches&&s.branches[choice]) s.branches[choice]();
      else { step++; nextStep(); }
    };
  }
}

function advance() {
  if (!waiting) return;
  waiting = false;
  step++;
  nextStep();
}

function showEndCard() {

function skipToMenu() {
  seq = []; waiting = false; choiceCb = null;
  document.getElementById('skip-btn').classList.remove('visible');
  fadeOut(() => { showScreen('menu'); fadeIn(null, 1800); renderMenuOptions(); }, 700);
}

function showSkip() { document.getElementById('skip-btn').classList.add('visible'); }
function hideSkip() { document.getElementById('skip-btn').classList.remove('visible'); }

function goMenu() {
  hideSkip();
  fadeOut(() => { showScreen('menu'); fadeIn(null, 1800); renderMenuOptions(); }, 1100);
}

function hasSaveGame() {
  return localStorage.getItem('ashes_savegame') !== null;
}

function getSaveInfo() {
  const raw = localStorage.getItem('ashes_savegame');
  if (!raw) return null;
  try {
    const data = JSON.parse(raw);
    return { level: data.kael?.level ?? 1, timestamp: data.timestamp };
  } catch (e) {
    return null;
  }
}

function formatSaveTime(timestamp) {
  if (!timestamp) return '';
  const diffMs = Date.now() - timestamp;
  const mins = Math.floor(diffMs / 60000);
  if (mins < 1)  return 'ahora mismo';
  if (mins < 60) return `hace ${mins} min`;
  const hours = Math.floor(mins / 60);
  if (hours < 24) return `hace ${hours}h`;
  return `hace ${Math.floor(hours / 24)}d`;
}

function renderMenuOptions() {
  const nav = document.getElementById('menu-options-nav');
  const hasSave = hasSaveGame();
  const info    = hasSave ? getSaveInfo() : null;

  nav.innerHTML = '';

  if (hasSave) {
    const contBtn = document.createElement('button');
    contBtn.className = 'menu-btn primary';
    contBtn.textContent = info
      ? `Continuar · Nv.${info.level} · ${formatSaveTime(info.timestamp)}`
      : 'Continuar';
    contBtn.onclick = () => startGame(true);
    nav.appendChild(contBtn);
  }

  const newBtn = document.createElement('button');
  newBtn.className = 'menu-btn' + (hasSave ? '' : ' primary');
  newBtn.textContent = 'Nueva Partida';
  newBtn.onclick = () => {
    if (hasSave) {
      confirmOverwrite(() => {
        localStorage.removeItem('ashes_savegame');
        startGame(false);
      });
    } else {
      startGame(false);
    }
  };
  nav.appendChild(newBtn);

  const optBtn = document.createElement('button');
  optBtn.className = 'menu-btn';
  optBtn.textContent = 'Opciones';
  optBtn.onclick = () => alert('Opciones — pendiente de implementar');
  nav.appendChild(optBtn);

  const introBtn = document.createElement('button');
  introBtn.className = 'menu-btn';
  introBtn.textContent = 'Ver Introducción';
  introBtn.onclick = replayIntro;
  nav.appendChild(introBtn);
}

function confirmOverwrite(onConfirm) {
  const ok = window.confirm('Iniciar una nueva partida borrará tu progreso guardado. ¿Continuar?');
  if (ok) onConfirm();
}

function startGame(loadSave) {
  fadeOut(() => {
    window.location.href = loadSave ? './game.html?load=1' : './game.html';
  }, 900);
}

function replayIntro() {
  fadeOut(() => {
    showScreen(null);
    setTimeout(runIntro, 300);
  }, 700);
}

document.addEventListener('click', e => {
  if (e.target.classList.contains('choice-btn')) {
    if (choiceCb) choiceCb(e.target.dataset.choice);
    return;
  }
  if (e.target.classList.contains('menu-btn')) return;
  advance();
});

document.addEventListener('keydown', e => {
  if (e.code === 'Space' || e.code === 'Enter') {
    if (choiceCb) return;
    advance();
  }
});

function runIntro() {
  showScreen('logo');
  const logo = document.getElementById('studioLogo');
  logo.classList.remove('reveal');
  void logo.offsetWidth;
  logo.classList.add('reveal');
  fadeIn(null, 900);

  setTimeout(() => {
    const note = document.getElementById('audio-note');
    note.classList.add('show');
    setTimeout(() => note.classList.remove('show'), 3800);
  }, 600);

  setTimeout(() => {
    fadeOut(() => {
      showScreen('death');
      fadeIn(() => {
        document.getElementById('rain').classList.add('visible');
        showSkip();
        runSeq(SEQ_DEATH, null);
      }, 1300);
    }, 1100);
  }, 5200);
}

window.addEventListener('load', () => {
  if (screen.orientation && screen.orientation.lock) {
    screen.orientation.lock('landscape').catch(() => {});
  }

  const warning = document.getElementById('rotate-warning');
  function checkOrientation() {
    const isPortrait = window.innerHeight > window.innerWidth;
    warning.classList.toggle('show', isPortrait);
  }
  checkOrientation();
  window.addEventListener('resize', checkOrientation);
  window.addEventListener('orientationchange', checkOrientation);

  setTimeout(runIntro, 250);
});
</script>
