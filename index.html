<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="screen-orientation" content="landscape" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <title>Ashes of the Reborn</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Cinzel:wght@400;500;600&family=EB+Garamond:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --gold:       #C9A84C;
      --gold-light: #E8C97A;
      --gold-dim:   #7A6030;
      --ash:        #1A1A1E;
      --ash-mid:    #12121A;
      --ash-deep:   #0A0A10;
      --ember:      #8B2A0A;
      --smoke:      #2E2E38;
      --text:       #D4C9A8;
      --text-dim:   #7A7060;
    }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: var(--ash-deep);
      font-family: 'EB Garamond', serif;
      color: var(--text);
      cursor: default;
    }

    /* ─── PARTICLE CANVAS ─── */
    #particles {
      position: fixed; inset: 0;
      pointer-events: none;
      z-index: 0;
    }

    /* ─── VIGNETTE ─── */
    .vignette {
      position: fixed; inset: 0;
      background: radial-gradient(ellipse at center,
        transparent 30%,
        rgba(5,5,10,0.7) 80%,
        rgba(5,5,10,0.97) 100%);
      pointer-events: none;
      z-index: 1;
    }

    /* ─── SCREENS ─── */
    .screen {
      position: fixed; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      opacity: 0;
      pointer-events: none;
      z-index: 10;
      transition: opacity 0.05s;
    }
    .screen.active {
      opacity: 1;
      pointer-events: all;
    }

    /* ══ SCREEN 1: VALIANT GAMING LOGO ══ */
    #screen-logo { background: #05050A; }

    .studio-logo {
      display: flex; flex-direction: column;
      align-items: center; gap: 28px;
      opacity: 0;
    }
    .studio-logo.reveal {
      animation: logoReveal 4.8s ease forwards;
    }
    @keyframes logoReveal {
      0%   { opacity: 0; transform: scale(0.92) translateY(8px); }
      18%  { opacity: 1; transform: scale(1) translateY(0); }
      72%  { opacity: 1; transform: scale(1); }
      100% { opacity: 0; transform: scale(1.03); }
    }
    .logo-emblem {
      width: min(300px, 72vw);
      height: auto;
      display: block;
      filter: drop-shadow(0 0 32px rgba(201,168,76,0.3));
    }
    @media (orientation: landscape) {
      .logo-emblem { width: min(240px, 38vw); }
    }
    /* El texto ya viene en la imagen — los ocultamos */
    .studio-name, .studio-sub { display: none; }

    /* ══ SCREEN 2: DEATH SCENE ══ */
    #screen-death { background: #07070F; }

    .rain-overlay {
      position: absolute; inset: 0;
      background: repeating-linear-gradient(
        180deg,
        transparent 0px, transparent 3px,
        rgba(100,120,160,0.025) 3px, rgba(100,120,160,0.025) 4px
      );
      animation: rainFall 0.35s linear infinite;
      opacity: 0;
      transition: opacity 1.8s;
    }
    .rain-overlay.visible { opacity: 1; }
    @keyframes rainFall {
      from { background-position: 0 0; }
      to   { background-position: 18px 72px; }
    }
    .street-glow {
      position: absolute; bottom: 0; left: 0; right: 0;
      height: 35%;
      background: linear-gradient(to top, rgba(50,70,110,0.12) 0%, transparent 100%);
      pointer-events: none;
    }
    .neon-flicker {
      position: absolute; top: 16%; right: 14%;
      width: 5px; height: 5px; border-radius: 50%;
      background: rgba(140,170,255,0.55);
      box-shadow: 0 0 18px 7px rgba(110,140,255,0.15);
      animation: flicker 4s steps(1) infinite;
    }
    @keyframes flicker {
      0%,17%,21%,24%,52%,56%,100% { opacity: 1; }
      19%,23%,54% { opacity: 0.25; }
    }

    /* ══ SCREEN 3: LIMBO ══ */
    #screen-limbo { background: #F2EEE4; }

    .limbo-fog {
      position: absolute; inset: 0;
      background: radial-gradient(ellipse 85% 65% at 50% 50%,
        rgba(255,255,255,0.96) 0%,
        rgba(228,222,210,0.88) 50%,
        rgba(195,188,175,0.72) 100%);
      animation: fogPulse 7s ease-in-out infinite;
    }
    @keyframes fogPulse {
      0%,100% { opacity: 0.88; transform: scale(1); }
      50%      { opacity: 1;   transform: scale(1.025); }
    }
    .limbo-light {
      position: absolute;
      width: 280px; height: 280px; border-radius: 50%;
      background: radial-gradient(circle, rgba(255,255,245,1) 0%, transparent 70%);
      top: 50%; left: 50%;
      transform: translate(-50%, -62%);
      filter: blur(45px);
      animation: lightFloat 9s ease-in-out infinite;
    }
    @keyframes lightFloat {
      0%,100% { transform: translate(-50%, -62%); opacity: 0.55; }
      50%      { transform: translate(-50%, -56%); opacity: 0.9; }
    }
    #screen-limbo .dialogue-box {
      background: rgba(240,235,220,0.92);
      border-color: rgba(120,100,60,0.25);
      border-top-color: rgba(120,100,60,0.55);
    }
    #screen-limbo .dialogue-box::before {
      background: linear-gradient(90deg, transparent, rgba(150,120,60,0.7), transparent);
    }
    #screen-limbo .dialogue-text { color: #28221A; }
    #screen-limbo .speaker-name  { color: #6A5020; }
    #screen-limbo .direction-text { color: #8A7850; }
    #screen-limbo .continue-hint { color: #9A8A60; }
    #screen-limbo .choice-btn {
      background: rgba(240,235,220,0.9);
      border-color: rgba(120,100,60,0.22);
      color: #2A2018;
    }
    #screen-limbo .choice-btn:hover { color: #6A5020; border-color: rgba(150,120,60,0.6); }
    #screen-limbo .choice-btn::before { background: #8A6830; }

    /* ══ SCREEN 4: MENU PRINCIPAL ══ */
    #screen-menu { background: var(--ash-deep); }

    /* Forzar orientación horizontal via CSS hint */
    @media (orientation: portrait) {
      #screen-menu .menu-layout {
        flex-direction: column;
        text-align: center;
      }
      #screen-menu .menu-left { border-right: none; border-bottom: 1px solid rgba(201,168,76,0.1); padding-bottom: 20px; }
      #screen-menu .menu-title { font-size: 1.6rem; }
      #screen-menu .menu-subtitle { font-size: 0.6rem; }
    }

    .menu-bg {
      position: absolute; inset: 0;
      background:
        radial-gradient(ellipse 70% 60% at 100% 100%,
          rgba(139,42,10,0.28) 0%, transparent 55%),
        radial-gradient(ellipse 40% 50% at 0% 0%,
          rgba(201,168,76,0.05) 0%, transparent 50%),
        linear-gradient(135deg, #04040A 0%, #0A0A16 100%);
    }

    /* Layout horizontal: izquierda = título, derecha = opciones */
    .menu-layout {
      position: relative; z-index: 2;
      display: flex; flex-direction: row;
      align-items: center;
      width: 100%; height: 100%;
      padding: 0 6vw;
      gap: 0;
    }

    .menu-left {
      flex: 1;
      display: flex; flex-direction: column;
      justify-content: center;
      padding-right: 5vw;
      border-right: 1px solid rgba(201,168,76,0.12);
    }

    .menu-right {
      flex: 0 0 auto;
      display: flex; flex-direction: column;
      justify-content: center;
      padding-left: 5vw;
      min-width: 200px;
    }

    .menu-title-wrap { position: relative; }

    .menu-title-bg {
      font-family: 'Cinzel Decorative', serif;
      font-size: clamp(1.4rem, 4.5vw, 4rem);
      font-weight: 900;
      color: transparent;
      -webkit-text-stroke: 1px var(--gold-dim);
      position: absolute; top: 50%; left: 0;
      transform: translateY(-50%);
      white-space: nowrap;
      opacity: 0.1; pointer-events: none;
      filter: blur(2px);
    }
    .menu-title {
      font-family: 'Cinzel Decorative', serif;
      font-size: clamp(1.4rem, 4.5vw, 4rem);
      font-weight: 900;
      background: linear-gradient(175deg,
        var(--gold-light) 0%,
        var(--gold) 45%,
        var(--gold-dim) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      filter: drop-shadow(0 0 24px rgba(201,168,76,0.2));
      position: relative;
      line-height: 1.15;
    }
    .menu-subtitle {
      font-family: 'Cinzel', serif;
      font-size: clamp(0.52rem, 1vw, 0.72rem);
      letter-spacing: 0.4em;
      color: var(--gold-dim);
      margin-top: 14px;
      text-transform: uppercase;
    }
    .menu-divider {
      width: 120px; height: 1px;
      background: linear-gradient(90deg, var(--gold), transparent);
      margin: 20px 0;
      position: relative;
    }
    .menu-divider::before {
      content: '✦';
      position: absolute; top: 50%; left: 0;
      transform: translateY(-50%);
      color: var(--gold); font-size: 0.6rem;
      background: var(--ash-deep); padding-right: 8px;
    }
    .menu-studio {
      font-family: 'Cinzel', serif;
      font-size: 0.58rem; letter-spacing: 0.3em;
      color: var(--gold-dim); opacity: 0.5;
      text-transform: uppercase;
    }

    .menu-options {
      display: flex; flex-direction: column;
      align-items: flex-start; gap: 2px;
    }
    .menu-btn {
      font-family: 'Cinzel', serif;
      font-size: clamp(0.82rem, 1.8vw, 0.95rem);
      letter-spacing: 0.18em;
      color: var(--text-dim);
      background: none; border: none;
      padding: 14px 0 14px 16px;
      cursor: pointer;
      position: relative;
      transition: color 0.2s, padding-left 0.2s;
      text-transform: uppercase;
      -webkit-tap-highlight-color: transparent;
      white-space: nowrap;
    }
    .menu-btn::before {
      content: '';
      position: absolute; left: 0; top: 50%;
      transform: translateY(-50%) scaleY(0);
      width: 2px; height: 60%;
      background: var(--gold);
      transition: transform 0.2s;
    }
    .menu-btn:active, .menu-btn:hover {
      color: var(--gold-light); padding-left: 22px;
    }
    .menu-btn:active::before, .menu-btn:hover::before { transform: translateY(-50%) scaleY(1); }
    .menu-btn.primary {
      color: var(--gold-light);
      font-size: clamp(0.9rem, 2vw, 1rem);
    }
    .menu-btn.primary:active, .menu-btn.primary:hover { color: #fff; }
    .menu-version {
      position: absolute; bottom: 16px; right: 20px;
      font-family: 'Cinzel', serif; font-size: 0.55rem;
      letter-spacing: 0.2em; color: var(--text-dim); opacity: 0.3;
    }
    .menu-version {
      position: absolute; bottom: 22px; right: 30px;
      font-family: 'Cinzel', serif; font-size: 0.58rem;
      letter-spacing: 0.2em; color: var(--text-dim); opacity: 0.35;
    }

    /* ─── SKIP BUTTON ─── */
    #skip-btn {
      position: fixed; top: 14px; right: 16px;
      font-family: 'Cinzel', serif;
      font-size: 0.65rem; letter-spacing: 0.25em;
      color: var(--gold-dim);
      background: rgba(8,8,14,0.7);
      border: 1px solid rgba(201,168,76,0.2);
      padding: 8px 16px;
      cursor: pointer; z-index: 200;
      opacity: 0; pointer-events: none;
      transition: opacity 0.4s, color 0.2s, border-color 0.2s;
    }
    #skip-btn.visible { opacity: 1; pointer-events: all; }
    #skip-btn:active { color: var(--gold); border-color: rgba(201,168,76,0.5); }

    /* ─── CINEMATIC AREA (arriba de la caja) ─── */
    .cinematic-area {
      position: absolute;
      top: 0; left: 0; right: 0;
      bottom: 28vh; /* deja espacio para la caja abajo */
      display: flex; align-items: center; justify-content: center;
      overflow: hidden;
    }
    /* placeholder visual hasta tener imagen/video real */
    .cinematic-placeholder {
      width: 100%; height: 100%;
      background: linear-gradient(180deg,
        rgba(10,13,20,0.0) 0%,
        rgba(10,13,20,0.6) 100%);
    }

    /* ─── DIALOGUE BOX ─── */
    .dialogue-box {
      position: absolute;
      bottom: 0; left: 0; right: 0;   /* full width, pegado al fondo */
      width: 100%;
      background: rgba(6,6,12,0.95);
      border-top: 2px solid rgba(201,168,76,0.5);
      border-bottom: none;
      padding: 14px 20px 12px;
      backdrop-filter: blur(12px);
      opacity: 0;
      transition: opacity 0.5s;
      /* altura fija para no invadir la cinemática */
      min-height: 26vh;
      max-height: 30vh;
      display: flex; flex-direction: column; justify-content: center;
    }
    @media (orientation: landscape) {
      .dialogue-box { min-height: 32vh; max-height: 36vh; padding: 10px 28px 10px; }
      .cinematic-area { bottom: 34vh; }
    }
    .dialogue-box.visible { opacity: 1; }
    .dialogue-box::before {
      content: '';
      position: absolute; top: 0; left: 0; right: 0; height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
    }
    .speaker-name {
      font-family: 'Cinzel', serif;
      font-size: 0.75rem; letter-spacing: 0.28em;
      color: var(--gold); text-transform: uppercase;
      margin-bottom: 6px; min-height: 1em;
    }
    .dialogue-text {
      font-family: 'EB Garamond', serif;
      font-size: 1.05rem;          /* fijo — legible en móvil */
      line-height: 1.6; color: var(--text);
      min-height: 1.8em;
    }
    @media (orientation: landscape) {
      .dialogue-text { font-size: 1rem; }
    }
    .direction-text {
      font-family: 'EB Garamond', serif;
      font-style: italic;
      font-size: 0.95rem;          /* fijo — legible en móvil */
      color: var(--text-dim); line-height: 1.55;
      min-height: 1.6em;
    }
    .continue-hint {
      text-align: right; margin-top: 8px;
      font-family: 'Cinzel', serif; font-size: 0.6rem;
      letter-spacing: 0.28em; color: var(--gold-dim);
      opacity: 0; transition: opacity 0.4s;
      animation: blink 2s ease-in-out infinite;
    }
    .continue-hint.visible { opacity: 1; }
    @keyframes blink {
      0%,100% { opacity: 0.35; } 50% { opacity: 0.9; }
    }

    /* ─── CHOICE BOX ─── */
    .choice-box {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      width: 100%;
      display: flex; flex-direction: column; gap: 0;
      opacity: 0; pointer-events: none;
      transition: opacity 0.5s;
      background: rgba(6,6,12,0.95);
      border-top: 2px solid rgba(201,168,76,0.5);
    }
    .choice-box.visible { opacity: 1; pointer-events: all; }

    .choice-label {
      font-family: 'Cinzel', serif;
      font-size: 0.65rem; letter-spacing: 0.3em;
      color: var(--gold-dim); text-transform: uppercase;
      padding: 10px 20px 4px;
    }

    .choice-btn {
      font-family: 'EB Garamond', serif;
      font-size: 1rem;
      letter-spacing: 0.04em; color: var(--text);
      background: transparent;
      border: none;
      border-top: 1px solid rgba(201,168,76,0.1);
      padding: 14px 24px; cursor: pointer;
      text-align: left;
      transition: all 0.18s;
      position: relative; overflow: hidden;
      -webkit-tap-highlight-color: rgba(201,168,76,0.1);
    }
    .choice-btn:first-of-type { border-top: 1px solid rgba(201,168,76,0.15); }
    .choice-btn::before {
      content: '';
      position: absolute; left: 0; top: 0; bottom: 0;
      width: 3px; background: var(--gold);
      transform: scaleY(0); transition: transform 0.18s;
    }
    .choice-btn:active {
      background: rgba(201,168,76,0.06);
      color: var(--gold-light); padding-left: 32px;
    }
    .choice-btn:active::before { transform: scaleY(1); }

    /* ─── OVERLAYS ─── */
    #flash {
      position: fixed; inset: 0; background: #fff;
      opacity: 0; pointer-events: none; z-index: 100;
    }
    #fade {
      position: fixed; inset: 0; background: #04040A;
      opacity: 1; pointer-events: none; z-index: 50;
      transition: opacity 1.2s ease;
    }
    #fade.clear { opacity: 0; }

    .ripple {
      position: fixed; border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.5);
      transform: scale(0); pointer-events: none; z-index: 99;
      animation: rippleOut 0.65s ease-out forwards;
    }
    @keyframes rippleOut { to { transform: scale(9); opacity: 0; } }

    #audio-note {
      position: fixed; bottom: 18px; left: 50%;
      transform: translateX(-50%);
      font-family: 'Cinzel', serif; font-size: 0.58rem;
      letter-spacing: 0.28em; color: var(--gold-dim);
      opacity: 0; transition: opacity 1.2s; z-index: 200;
      white-space: nowrap;
    }
    #audio-note.show { opacity: 0.45; }
  </style>
</head>
<body>

<canvas id="particles"></canvas>
<div class="vignette"></div>
<div id="flash"></div>
<div id="fade"></div>

<!-- SCREEN 1: LOGO -->
<div class="screen" id="screen-logo">
  <div class="studio-logo" id="studioLogo">
    <img src="valiant.png" class="logo-emblem" alt="Valiant Gaming" />
  </div>
</div>

<!-- SKIP BUTTON (visible durante intro) -->
<button id="skip-btn" onclick="skipToMenu()">SALTAR ›</button>

<!-- SCREEN 2: MUERTE -->
<div class="screen" id="screen-death">
  <div class="rain-overlay" id="rain"></div>
  <div class="street-glow"></div>
  <div class="neon-flicker"></div>
  <!-- Área cinemática superior — aquí irá imagen/video -->
  <div class="cinematic-area">
    <div class="cinematic-placeholder"></div>
  </div>
  <div class="dialogue-box" id="death-dialogue">
    <div class="speaker-name"  id="death-speaker"></div>
    <div class="direction-text" id="death-dir"></div>
    <div class="dialogue-text"  id="death-text"></div>
    <div class="continue-hint"  id="death-hint">[ TOCA PARA CONTINUAR ]</div>
  </div>
</div>

<!-- SCREEN 3: LIMBO -->
<div class="screen" id="screen-limbo">
  <div class="limbo-fog"></div>
  <div class="limbo-light"></div>
  <!-- Área cinemática superior -->
  <div class="cinematic-area">
    <div class="cinematic-placeholder"></div>
  </div>
  <div class="dialogue-box" id="limbo-dialogue">
    <div class="speaker-name"  id="limbo-speaker"></div>
    <div class="direction-text" id="limbo-dir"></div>
    <div class="dialogue-text"  id="limbo-text"></div>
    <div class="continue-hint"  id="limbo-hint">[ TOCA PARA CONTINUAR ]</div>
  </div>
  <div class="choice-box" id="limbo-choices">
    <div class="choice-label">¿Qué decides?</div>
    <button class="choice-btn" data-choice="accept">— De acuerdo.</button>
    <button class="choice-btn" data-choice="refuse">— No.</button>
  </div>
</div>

<!-- SCREEN 4: MENÚ -->
<div class="screen" id="screen-menu">
  <div class="menu-bg"></div>
  <div class="menu-layout">
    <!-- IZQUIERDA: título -->
    <div class="menu-left">
      <div class="menu-title-wrap">
        <div class="menu-title-bg">ASHES OF<br>THE REBORN</div>
        <div class="menu-title">ASHES OF<br>THE REBORN</div>
      </div>
      <div class="menu-subtitle">Un mundo aguarda. Un destino elegido.</div>
      <div class="menu-divider"></div>
      <div class="menu-studio">Valiant Gaming · Beta v0.1</div>
    </div>
    <!-- DERECHA: opciones -->
    <div class="menu-right">
      <nav class="menu-options">
        <button class="menu-btn primary" onclick="startGame()">Nueva Partida</button>
        <button class="menu-btn" style="opacity:0.4;pointer-events:none">Continuar</button>
        <button class="menu-btn" style="opacity:0.4;pointer-events:none">Opciones</button>
        <button class="menu-btn" onclick="replayIntro()">Ver Introducción</button>
      </nav>
    </div>
  </div>
  <div class="menu-version">IRONFELL</div>
</div>

<div id="audio-note">ACTIVA EL AUDIO PARA MEJOR EXPERIENCIA</div>

<script>
// ══════════════════════════════════════════════
//  ASHES OF THE REBORN — INTRO ENGINE
//  Valiant Gaming © 2026
// ══════════════════════════════════════════════

// ── PARTICLES ────────────────────────────────
const canvas = document.getElementById('particles');
const ctx    = canvas.getContext('2d');

function resizeCanvas() {
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

class Particle {
  constructor() { this.reset(true); }
  reset(random) {
    this.x    = Math.random() * canvas.width;
    this.y    = random ? Math.random() * canvas.height : canvas.height + 5;
    this.size = Math.random() * 1.1 + 0.2;
    this.vx   = (Math.random() - 0.5) * 0.1;
    this.vy   = -(Math.random() * 0.22 + 0.06);
    this.maxL = Math.random() * 280 + 160;
    this.life = random ? Math.random() * this.maxL : 0;
    this.hue  = Math.random() * 25 + 32;
  }
  update() {
    this.x += this.vx; this.y += this.vy; this.life++;
    if (this.life > this.maxL || this.y < -4) this.reset(false);
  }
  draw() {
    const p = this.life / this.maxL;
    const a = p < 0.12 ? p/0.12 : p > 0.78 ? (1-p)/0.22 : 1;
    ctx.save();
    ctx.globalAlpha = a * 0.3;
    ctx.fillStyle = `hsl(${this.hue},58%,58%)`;
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size, 0, Math.PI*2);
    ctx.fill();
    ctx.restore();
  }
}

const parts = Array.from({length:90}, () => new Particle());
(function loop() { ctx.clearRect(0,0,canvas.width,canvas.height); parts.forEach(p=>{p.update();p.draw();}); requestAnimationFrame(loop); })();

// ── SCREEN MANAGER ───────────────────────────
const SCREENS = {
  logo:  document.getElementById('screen-logo'),
  death: document.getElementById('screen-death'),
  limbo: document.getElementById('screen-limbo'),
  menu:  document.getElementById('screen-menu'),
};

function showScreen(id) {
  Object.values(SCREENS).forEach(s => s.classList.remove('active'));
  if (id && SCREENS[id]) SCREENS[id].classList.add('active');
}

const fadeEl = document.getElementById('fade');
function fadeIn(cb, ms=1200) {
  fadeEl.style.transition = 'none';
  fadeEl.style.opacity = '1';
  fadeEl.classList.remove('clear');
  requestAnimationFrame(() => requestAnimationFrame(() => {
    fadeEl.style.transition = `opacity ${ms}ms ease`;
    fadeEl.style.opacity = '0';
    setTimeout(() => { fadeEl.classList.add('clear'); cb&&cb(); }, ms);
  }));
}
function fadeOut(cb, ms=1000) {
  fadeEl.classList.remove('clear');
  fadeEl.style.transition = `opacity ${ms}ms ease`;
  fadeEl.style.opacity = '1';
  setTimeout(() => cb&&cb(), ms);
}

const flashEl = document.getElementById('flash');
function gunFlash(cb) {
  flashEl.style.transition = 'none';
  flashEl.style.opacity = '1';
  const r = Object.assign(document.createElement('div'), { className:'ripple' });
  Object.assign(r.style, { width:'50px', height:'50px', top:'44%', left:'47%', marginLeft:'-25px', marginTop:'-25px' });
  document.body.appendChild(r);
  setTimeout(() => r.remove(), 750);
  requestAnimationFrame(() => requestAnimationFrame(() => {
    flashEl.style.transition = 'opacity 0.85s ease';
    flashEl.style.opacity = '0';
    setTimeout(() => cb&&cb(), 950);
  }));
}

// ── TYPEWRITER ───────────────────────────────
function typewrite(el, text, speed, cb) {
  el.textContent = '';
  let i = 0;
  const t = setInterval(() => {
    el.textContent += text[i++];
    if (i >= text.length) { clearInterval(t); cb&&setTimeout(cb,250); }
  }, speed||26);
  return t;
}

// ── DIALOGUE ENGINE ──────────────────────────
let seq = [], step = 0, waiting = false, onSeqDone = null;
let choiceCb = null;

function runSeq(sequence, done) {
  seq = sequence; step = 0; waiting = false; onSeqDone = done;
  nextStep();
}

function nextStep() {
  if (step >= seq.length) { onSeqDone&&onSeqDone(); return; }
  const s = seq[step];

  if (s.type === 'dir' || s.type === 'line') {
    const box  = document.getElementById(s.box+'-dialogue');
    const spk  = document.getElementById(s.box+'-speaker');
    const dir  = document.getElementById(s.box+'-dir');
    const txt  = document.getElementById(s.box+'-text');
    const hint = document.getElementById(s.box+'-hint');

    box.classList.add('visible');
    hint.classList.remove('visible');

    if (s.type === 'dir') {
      spk.textContent = '';
      txt.textContent = '';
      typewrite(dir, s.text, 20, () => { waiting = true; hint.classList.add('visible'); });
    } else {
      dir.textContent = '';
      spk.textContent = (s.speaker||'').toUpperCase();
      typewrite(txt, '— '+s.text, 25, () => { waiting = true; hint.classList.add('visible'); });
    }
  }

  else if (s.type === 'action') {
    s.fn(() => { step++; nextStep(); });
  }

  else if (s.type === 'choice') {
    document.getElementById(s.box+'-dialogue').classList.remove('visible');
    const cbox = document.getElementById(s.box+'-choices');
    cbox.classList.add('visible');
    choiceCb = (choice) => {
      cbox.classList.remove('visible');
      choiceCb = null;
      if (s.branches&&s.branches[choice]) s.branches[choice]();
      else { step++; nextStep(); }
    };
  }
}

function advance() {
  if (!waiting) return;
  waiting = false;
  step++;
  nextStep();
}

  {type:'action', fn(next) {

function showEndCard() {
  const el = document.createElement('div');
  el.style.cssText = 'position:fixed;inset:0;background:#04040A;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:300;opacity:0;transition:opacity 1.6s;';

    <p style="font-family:'EB Garamond',serif;font-style:italic;

       text-align:center;line-height:2.1;max-width:480px;padding:0 24px;">
      "Algunos eligen el descanso.<br>
      Aeltherion sigue esperando<br>a alguien que no lo haga."
    </p>
    <button onclick="location.reload()" style="margin-top:52px;font-family:'Cinzel',serif;
      font-size:0.65rem;letter-spacing:0.32em;color:#7A6030;
      background:none;border:1px solid #7A6030;padding:13px 34px;
      cursor:pointer;transition:all 0.25s;"

      onmouseout="this.style.color='#7A6030';this.style.borderColor='#7A6030'">
      VOLVER AL INICIO
    </button>`;

}

function skipToMenu() {
  seq = []; waiting = false; choiceCb = null;
  document.getElementById('skip-btn').classList.remove('visible');
  fadeOut(() => { showScreen('menu'); fadeIn(null, 1800); }, 700);
}

function showSkip() { document.getElementById('skip-btn').classList.add('visible'); }
function hideSkip() { document.getElementById('skip-btn').classList.remove('visible'); }

// ── NAVIGATION ───────────────────────────────
function goMenu() {
  hideSkip();
  fadeOut(() => { showScreen('menu'); fadeIn(null, 1800); }, 1100);
}

function startGame() {
  fadeOut(() => {
    const el = document.createElement('div');
    el.style.cssText = 'position:fixed;inset:0;background:#04040A;display:flex;align-items:center;justify-content:center;z-index:300;opacity:0;transition:opacity 1.2s;';
    el.innerHTML = `<div style="text-align:center;">
      <p style="font-family:'Cinzel',serif;font-size:clamp(0.7rem,1.4vw,0.95rem);
         letter-spacing:0.3em;color:#C9A84C;margin-bottom:16px;">IRONFELL — BETA v0.1</p>
      <p style="font-family:'EB Garamond',serif;font-style:italic;
         font-size:clamp(0.9rem,1.6vw,1.1rem);color:#7A7060;">
         El mundo de Aeltherion está siendo construido...</p>
      <p style="font-family:'Cinzel',serif;font-size:0.6rem;
         letter-spacing:0.25em;color:#4A4030;margin-top:40px;">
         Three.js • Próximamente</p>
    </div>`;
    document.body.appendChild(el);
    fadeIn(() => requestAnimationFrame(()=>requestAnimationFrame(()=>el.style.opacity='1')), 1000);
  }, 900);
}

function replayIntro() {
  fadeOut(() => {
    showScreen(null);
    setTimeout(runIntro, 300);
  }, 700);
}

// ── INPUT ────────────────────────────────────
document.addEventListener('click', e => {
  if (e.target.classList.contains('choice-btn')) {
    if (choiceCb) choiceCb(e.target.dataset.choice);
    return;
  }
  if (e.target.classList.contains('menu-btn')) return;
  advance();
});

document.addEventListener('keydown', e => {
  if (e.code === 'Space' || e.code === 'Enter') {
    if (choiceCb) return;
    advance();
  }
});

// ── BOOT ─────────────────────────────────────
function runIntro() {
  showScreen('logo');
  const logo = document.getElementById('studioLogo');
  logo.classList.remove('reveal');
  void logo.offsetWidth;
  logo.classList.add('reveal');
  fadeIn(null, 900);

  setTimeout(() => {
    const note = document.getElementById('audio-note');
    note.classList.add('show');
    setTimeout(() => note.classList.remove('show'), 3800);
  }, 600);

  // Logo → Death scene
  setTimeout(() => {
    fadeOut(() => {
      showScreen('death');
      fadeIn(() => {
        document.getElementById('rain').classList.add('visible');
        showSkip();
        runSeq(SEQ_DEATH, null);
      }, 1300);
    }, 1100);
  }, 5200);
}

window.addEventListener('load', () => {
  // Intentar forzar landscape
  if (screen.orientation && screen.orientation.lock) {
    screen.orientation.lock('landscape').catch(() => {});
  }
  setTimeout(runIntro, 250);
});
