<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Diagnóstico - Ashes</title>
  <style>
    body { background: #0a0a14; color: #c9a84c; font-family: monospace; padding: 20px; margin: 0; }
    .ok    { color: #2ecc71; }
    .error { color: #e74c3c; }
    .warn  { color: #f39c12; }
    pre { background: #1a1a2a; padding: 10px; overflow-x: auto; font-size: 12px; margin: 5px 0; border-radius: 4px; }
    .file { margin: 3px 0; font-size: 13px; }
    .err-detail { margin-left: 20px; color: #e74c3c; font-size: 11px; opacity: 0.8; }
    h3 { margin: 20px 0 6px; color: #c9a84c; font-size: 13px; letter-spacing: 2px; }
    hr { border-color: rgba(201,168,76,0.15); margin: 12px 0; }
    .badge { font-size: 10px; padding: 1px 6px; border-radius: 3px; margin-left: 6px; vertical-align: middle; }
    .badge-ok      { background: rgba(46,204,113,0.15);  color: #2ecc71; }
    .badge-error   { background: rgba(231,76,60,0.15);   color: #e74c3c; }
    .badge-pending { background: rgba(243,156,18,0.15);  color: #f39c12; }
    .summary-box { background: #1a1a2a; border: 1px solid rgba(201,168,76,0.2); border-radius: 6px; padding: 16px; margin: 16px 0; }
    .summary-row { display: flex; justify-content: space-between; padding: 4px 0; border-bottom: 1px solid rgba(255,255,255,0.04); font-size: 13px; }
    .summary-row:last-child { border-bottom: none; }
    .progress-bar { height: 3px; background: #1a1a2a; border-radius: 2px; margin: 12px 0 4px; overflow: hidden; }
    .progress-fill { height: 100%; background: linear-gradient(90deg, #2ecc71, #c9a84c); border-radius: 2px; }
    .error-log { background: rgba(231,76,60,0.06); border: 1px solid rgba(231,76,60,0.2); border-radius: 6px; padding: 12px; margin-top: 16px; }
    .error-entry { font-size: 11px; color: #e8c0b8; margin: 4px 0; padding: 4px 0; border-bottom: 1px solid rgba(231,76,60,0.1); }
    .error-entry:last-child { border-bottom: none; }
    .timestamp { color: rgba(201,168,76,0.4); font-size: 10px; margin-bottom: 16px; }
  </style>
</head>
<body>
<h2 style="letter-spacing:3px; margin-bottom:4px;">🔍 Diagnóstico — Ashes of the Reborn</h2>
<div class="timestamp" id="ts"></div>
<div id="results">Cargando...</div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
  }
}
</script>

<script type="module">
document.getElementById('ts').textContent =
  'Ejecutado: ' + new Date().toLocaleString('es-CO');

const resultsDiv = document.getElementById('results');

const sections = [
  {
    title: '📦 Core — Fases 0–5',
    files: [
      { path: './core/scene.js',     name: 'initScene' },
      { path: './core/loop.js',      name: 'startLoop' },
      { path: './core/resize.js',    name: 'initResize' },
      { path: './core/player.js',    name: 'Player' },
      { path: './core/joystick.js',  name: 'VirtualJoystick' },
      { path: './core/camera.js',    name: 'ThirdPersonCamera' },
      { path: './core/combat.js',    name: 'CombatSystem' },
      { path: './core/enemy.js',     name: 'spawnEnemies' },
      { path: './core/npc.js',       name: 'spawnNPCs' },
      { path: './core/inventory.js', name: 'inventory' },
      { path: './ui/hudLayout.js',  export: 'applyHudLayout' },
{ path: './core/loop.js',     export: 'startLoop' },
{ path: './ui/radialMenu.js', export: 'RadialMenu' },
{ path: './ui/buildMenu.js',  export: 'BuildMenu' },
    ]
  },
  {
    title: '⚔️ Core — Fases 6–7',
    files: [
      { path: './core/skillSystem.js',    name: 'SkillSystem' },
      { path: './core/skillData.js',      name: 'SKILL_DATA' },
      { path: './core/progression.js',    name: 'Progression' },
      { path: './core/weapons/katana.js', name: 'KatanaWeapon' },
      { path: './core/weapons/sword.js',  name: 'SwordWeapon' },
      { path: './core/weapons/magic.js',  name: 'MagicWeapon' },
      { path: './core/weapons/bow.js',    name: 'BowWeapon' },
    ]
  },
  {
    title: '📖 Core — Fase 8 (Narrativa)',
    files: [
      { path: './core/narrative.js',   name: 'NarrativeSystem' },
      { path: './core/triggers.js',    name: 'WorldTriggers' },
      { path: './core/parry.js',       name: 'ParrySystem' },
      { path: './data/storyEvents.js', name: 'STORY_EVENTS' },
      { path: './data/dialogues.js',   name: 'DIALOGUES' },
    ]
  },
  {
    title: '🏗 Core — Construcción',
    files: [
      { path: './core/building.js',    name: 'BuildingSystem' },
      { path: './data/structures.js',  name: 'STRUCTURES' },
      { path: './data/skills.js',      name: 'SKILLS' },
    ]
  },
  {
    title: '🗺️ Core — Futuro',
    files: [
      { path: './core/worldMap.js',    name: 'WorldMap',      pending: true },
      { path: './core/dayNight.js',    name: 'DayNightCycle', pending: true },
      { path: './core/weather.js',     name: 'WeatherSystem', pending: true },
      { path: './core/relations.js',   name: 'RelationSystem',pending: true },
      { path: './core/cinematic.js',   name: 'CinematicSystem',pending: true },
    ]
  },
  {
    title: '🎮 UI — Existente',
    files: [
      { path: './ui/hud.js',          name: 'HUD' },
      { path: './ui/weaponSelect.js', name: 'showWeaponSelect' },
      { path: './ui/dialogue.js',     name: 'DialogueUI' },
      { path: './ui/shop.js',         name: 'ShopUI' },
      { path: './ui/skillBar.js',     name: 'SkillBar' },
      { path: './ui/subtypeMenu.js',  name: 'SubtypeMenu' },
      { path: './ui/pauseMenu.js',    name: 'PauseMenu' },
      { path: './ui/fusionMenu.js',   name: 'FusionMenu' },
    ]
  },
  {
    title: '🎮 UI — Fase 8+',
    files: [
      { path: './ui/buildMenu.js',    name: 'BuildMenu' },
      { path: './ui/skillTree.js',    name: 'SkillTree' },
      { path: './ui/radialMenu.js',   name: 'RadialMenu' },
    ]
  },
  {
    title: '🎮 UI — Futuro',
    files: [
      { path: './ui/mapUI.js',        name: 'MapUI',      pending: true },
      { path: './ui/relationBar.js',  name: 'RelationBar',pending: true },
      { path: './ui/craftMenu.js',    name: 'CraftMenu',  pending: true },
    ]
  },
  {
    title: '✨ Skills — Magia base',
    files: [
      { path: './skills/fireball.js',  name: 'Fireball' },
      { path: './skills/iceShard.js',  name: 'IceShard' },
      { path: './skills/windGust.js',  name: 'WindGust' },
      { path: './skills/thornShot.js', name: 'ThornShot' },
    ]
  },
  {
    title: '⚔️ Skills — Katana',
    files: [
      { path: './skills/katana/quickSlash.js',   name: 'QuickSlash' },
      { path: './skills/katana/flashStep.js',    name: 'FlashStep' },
      { path: './skills/katana/bladeDance.js',   name: 'BladeDance' },
      { path: './skills/katana/thousandCuts.js', name: 'ThousandCuts' },
    ]
  },
  {
    title: '🗡️ Skills — Espada (pendiente)',
    files: [
      { path: './skills/sword/heavyStrike.js', name: 'HeavyStrike', pending: true },
      { path: './skills/sword/shieldBash.js',  name: 'ShieldBash',  pending: true },
      { path: './skills/sword/whirlwind.js',   name: 'Whirlwind',   pending: true },
      { path: './skills/sword/lastStand.js',   name: 'LastStand',   pending: true },
    ]
  },
  {
    title: '🏹 Skills — Arco (pendiente)',
    files: [
      { path: './skills/bow/precisionShot.js', name: 'PrecisionShot', pending: true },
      { path: './skills/bow/multiShot.js',     name: 'MultiShot',     pending: true },
      { path: './skills/bow/smokeTrap.js',     name: 'SmokeTrap',     pending: true },
      { path: './skills/bow/eagleEye.js',      name: 'EagleEye',      pending: true },
    ]
  },
  {
    title: '💀 Enemies — Futuro',
    files: [
      { path: './core/enemies/bossSystem.js',  name: 'BossSystem',  pending: true },
      { path: './core/enemies/forestPack.js',  name: 'ForestPack',  pending: true },
      { path: './core/enemies/eliteEnemy.js',  name: 'EliteEnemy',  pending: true },
    ]
  },
];

let totalOk = 0, totalError = 0, totalPending = 0;
const errors = [];
let html = '';

for (const section of sections) {
  html += `<hr><h3>${section.title}</h3>`;
  for (const file of section.files) {
    if (file.pending) {
      html += `<div class="file"><span class="warn">○</span> ${file.path} <span class="badge badge-pending">PENDIENTE</span></div>`;
      totalPending++;
      continue;
    }
    try {
      const mod = await import(file.path);
      const hasExport = mod[file.name] !== undefined || Object.keys(mod).length > 0;
      if (hasExport) {
        html += `<div class="file"><span class="ok">✓</span> ${file.path} <span class="badge badge-ok">${file.name}</span></div>`;
        totalOk++;
      } else {
        html += `<div class="file"><span class="error">✗</span> ${file.path} <span class="badge badge-error">sin export '${file.name}'</span></div>`;
        errors.push({ path: file.path, msg: `No exporta '${file.name}'` });
        totalError++;
      }
    } catch(e) {
      const short = e.message.length > 80 ? e.message.slice(0, 80) + '…' : e.message;
      html += `<div class="file"><span class="error">✗</span> ${file.path} <span class="badge badge-error">ERROR</span></div>`;
      html += `<div class="err-detail">↳ ${short}</div>`;
      errors.push({ path: file.path, msg: e.message });
      totalError++;
    }
  }
}

const total = totalOk + totalError + totalPending;
const pct   = total > 0 ? Math.round((totalOk / (totalOk + totalError)) * 100) : 0;

html += `
  <hr>
  <h3>📊 Resumen</h3>
  <div class="summary-box">
    <div class="summary-row"><span>✓ OK</span><span class="ok">${totalOk}</span></div>
    <div class="summary-row"><span>✗ Error</span><span class="error">${totalError}</span></div>
    <div class="summary-row"><span>○ Pendiente</span><span class="warn">${totalPending}</span></div>
    <div class="summary-row"><span>Total</span><span>${total}</span></div>
    <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
    <div style="font-size:11px;color:rgba(201,168,76,0.5);">${pct}% sin error</div>
  </div>
`;

if (errors.length > 0) {
  html += `<div class="error-log"><h4 style="color:#e74c3c;font-size:11px;letter-spacing:2px;margin-bottom:8px;">⚠ ERRORES (${errors.length})</h4>`;
  errors.forEach(e => {
    html += `<div class="error-entry"><span style="color:#c9a84c;">${e.path}</span><br>${e.msg}</div>`;
  });
  html += '</div>';
}

resultsDiv.innerHTML = html;
</script>
</body>
</html>
