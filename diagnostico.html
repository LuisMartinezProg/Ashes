<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Diagnóstico - Ashes</title>
  <style>
    body { background: #0a0a14; color: #c9a84c; font-family: monospace; padding: 20px; margin: 0; }
    .ok { color: #2ecc71; }
    .error { color: #e74c3c; }
    .pending { color: #f39c12; }
    pre { background: #1a1a2a; padding: 10px; overflow-x: auto; font-size: 12px; margin: 5px 0; }
    .file { margin: 3px 0; }
  </style>
</head>
<body>
<h2>🔍 Diagnóstico - Ashes of the Reborn</h2>
<div id="results">Cargando...</div>

<script src="//cdn.jsdelivr.net/npm/eruda"></script>
<script>eruda.init(); eruda.show();</script>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
  }
}
</script>

<script type="module">
  const resultsDiv = document.getElementById('results');
  let html = '';

  // Lista de archivos a verificar
  const filesToCheck = [
    // Core
    { path: './core/player.js', name: 'Player' },
    { path: './core/joystick.js', name: 'VirtualJoystick' },
    { path: './core/camera.js', name: 'ThirdPersonCamera' },
    { path: './core/scene.js', name: 'initScene' },
    { path: './core/loop.js', name: 'loop.js' },
    { path: './core/combat.js', name: 'CombatSystem' },
    { path: './core/enemy.js', name: 'Enemy' },
    { path: './core/skillSystem.js', name: 'SkillSystem' },
    { path: './core/npc.js', name: 'NPC' },
    { path: './core/inventory.js', name: 'inventory' },
    { path: './core/progression.js', name: 'Progression' },
    // UI
    { path: './ui/hud.js', name: 'HUD' },
    { path: './ui/weaponSelect.js', name: 'showWeaponSelect' },
    { path: './ui/dialogue.js', name: 'DialogueUI' },
    { path: './ui/shop.js', name: 'ShopUI' },
    { path: './ui/skillBar.js', name: 'SkillBar' },
    { path: './ui/subtypeMenu.js', name: 'SubtypeMenu' },
    { path: './ui/pauseMenu.js', name: 'PauseMenu' },
    { path: './ui/fusionMenu.js', name: 'FusionMenu' },
    // Skills base
    { path: './skills/fireball.js', name: 'Fireball' },
    { path: './skills/iceShard.js', name: 'IceShard' },
    { path: './skills/windGust.js', name: 'WindGust' },
    { path: './skills/thornShot.js', name: 'ThornShot' },
    // Skills katana (los que fallan)
    { path: './skills/katana/quickSlash.js', name: 'QuickSlash' },
    { path: './skills/katana/flashStep.js', name: 'FlashStep' },
    { path: './skills/katana/bladeDance.js', name: 'BladeDance' },
    { path: './skills/katana/thousandCuts.js', name: 'ThousandCuts' },
    // Data
    { path: './data/dialogues.js', name: 'DIALOGUES' }
  ];

  for (const file of filesToCheck) {
    try {
      const module = await import(file.path);
      const hasExport = module[file.name] !== undefined || Object.keys(module).length > 0;
      if (hasExport) {
        html += `<div class="file"><span class="ok">✓</span> ${file.path}</div>`;
      } else {
        html += `<div class="file"><span class="error">✗</span> ${file.path} - No exporta '${file.name}'</div>`;
      }
    } catch(e) {
      html += `<div class="file"><span class="error">✗</span> ${file.path} - ${e.message}</div>`;
      // Si falla un archivo de katana, mostrar sugerencia
      if (file.path.includes('katana')) {
        html += `<pre style="color:#f39c12; margin-left:20px">→ Sugerencia: Crea ${file.path}</pre>`;
      }
    }
  }

  // Verificar estructura de carpetas
  html += '<br><hr><h3>📁 Estructura necesaria:</h3><pre>';
  html += 'skills/\n';
  html += '├── fireball.js ✓\n';
  html += '├── iceShard.js ✓\n';
  html += '├── windGust.js ✓\n';
  html += '├── thornShot.js ✓\n';
  html += '└── katana/\n';
  html += '    ├── quickSlash.js ' + (filesToCheck.find(f => f.path === './skills/katana/quickSlash.js')?.ok ? '✓' : '❌') + '\n';
  html += '    ├── flashStep.js ' + (filesToCheck.find(f => f.path === './skills/katana/flashStep.js')?.ok ? '✓' : '❌') + '\n';
  html += '    ├── bladeDance.js ' + (filesToCheck.find(f => f.path === './skills/katana/bladeDance.js')?.ok ? '✓' : '❌') + '\n';
  html += '    └── thousandCuts.js ' + (filesToCheck.find(f => f.path === './skills/katana/thousandCuts.js')?.ok ? '✓' : '❌') + '\n';
  html += '</pre>';

  resultsDiv.innerHTML = html;
</script>
</body>
</html>
