<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mínimo - Ashes</title>
  <style>
    body { margin: 0; overflow: hidden; font-family: monospace; }
    #info {
      position: fixed;
      top: 20px;
      left: 20px;
      color: lime;
      background: black;
      padding: 10px;
      z-index: 100;
      font-size: 14px;
    }
    #error {
      position: fixed;
      bottom: 20px;
      left: 20px;
      right: 20px;
      color: red;
      background: black;
      padding: 10px;
      z-index: 100;
      font-size: 12px;
      white-space: pre-wrap;
      word-break: break-word;
    }
  </style>
</head>
<body>
<div id="info">Cargando...</div>
<div id="error"></div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
  }
}
</script>

<script type="module">
  import * as THREE from 'three';
  
  const info = document.getElementById('info');
  const errorDiv = document.getElementById('error');
  
  try {
    info.textContent = "Inicializando THREE...";
    
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x050510);
    
    const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(5, 5, 10);
    camera.lookAt(0, 0, 0);
    
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);
    
    info.textContent = "Añadiendo luz y objetos...";
    
    // Luz
    const light = new THREE.DirectionalLight(0xffffff, 1);
    light.position.set(5, 10, 7);
    scene.add(light);
    scene.add(new THREE.AmbientLight(0x404060));
    
    // Cubo de prueba
    const cube = new THREE.Mesh(
      new THREE.BoxGeometry(1, 1, 1),
      new THREE.MeshStandardMaterial({ color: 0xc9a84c, metalness: 0.5 })
    );
    scene.add(cube);
    
    // Suelo
    const grid = new THREE.GridHelper(20, 20, 0xc9a84c, 0x334455);
    scene.add(grid);
    
    info.textContent = "✅ Todo cargado correctamente. El juego base funciona!";
    info.style.color = "lime";
    
    let time = 0;
    function animate() {
      requestAnimationFrame(animate);
      time += 0.01;
      cube.rotation.x = Math.sin(time) * 0.5;
      cube.rotation.y = time;
      renderer.render(scene, camera);
    }
    animate();
    
  } catch(e) {
    errorDiv.textContent = "ERROR: " + e.message + "\n\n" + e.stack;
    info.textContent = "❌ Error al cargar";
    info.style.color = "red";
  }
</script>
</body>
</html>
