<script type="module">
  const imports = [
    './core/loop.js',
    './core/resize.js',
    './core/combat.js',
    './core/enemy.js',
    './core/skillSystem.js',
    './core/progression.js',
    './core/npc.js',
    './core/inventory.js',
    './ui/hud.js',
    './ui/weaponSelect.js',
    './ui/dialogue.js',
    './ui/shop.js',
    './ui/skillBar.js',
    './ui/subtypeMenu.js',
    './ui/pauseMenu.js',
    './ui/fusionMenu.js',
  ];

  for (const path of imports) {
    try {
      await import(path);
      document.body.innerHTML += `<div style="color:lime;font-family:monospace;font-size:12px;padding:2px 8px">✓ ${path}</div>`;
    } catch(e) {
      document.body.innerHTML += `<div style="color:red;font-family:monospace;font-size:12px;padding:2px 8px">✗ ${path}: ${e.message}</div>`;
    }
  }
</script>
