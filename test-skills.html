<style>
  body { background: #0a0a14; color: #ccc; font-family: monospace; padding: 16px; }
  #out { white-space: pre; font-size: 13px; line-height: 1.8; }
  .ok  { color: #44ff88; }
  .err { color: #ff4444; }
  .inf { color: #88aaff; }
</style>
</head>
<body>
<div id="out">Probando...</div>
<script type="importmap">
{"imports":{"three":"https://unpkg.com/three@0.160.0/build/three.module.js"}}

<script type="module">
const out = document.getElementById('out');
const results = [];

function render() {
  out.innerHTML = results.map(r => {
    if (r.startsWith('✅')) return `<span class="ok">${r}</span>`;
    if (r.startsWith('❌')) return `<span class="err">${r}</span>`;
    return `<span class="inf">${r}</span>`;
  }).join('\n');
}

async function test(name, fn) {
  try {
    await fn();
    results.push(`✅ ${name}`);
  } catch(e) {
    results.push(`❌ ${name}: ${e.message}`);
  }
  render();
}

// ── Imports individuales ──
await test('Fireball',      () => import('./skills/fireball.js'));
await test('IceShard',      () => import('./skills/iceShard.js'));
await test('WindGust',      () => import('./skills/windGust.js'));
await test('ThornShot',     () => import('./skills/thornShot.js'));
await test('QuickSlash',    () => import('./skills/katana/quickSlash.js'));
await test('FlashStep',     () => import('./skills/katana/flashStep.js'));
await test('BladeDance',    () => import('./skills/katana/bladeDance.js'));
await test('ThousandCuts',  () => import('./skills/katana/thousandCuts.js'));
await test('Cleave',        () => import('./skills/sword/cleave.js'));
await test('ShieldBash',    () => import('./skills/sword/shieldBash.js'));

await test('Execute',       () => import('./skills/sword/execute.js'));
await test('PiercingShot',  () => import('./skills/bow/piercingShot.js'));
await test('RainOfArrows',  () => import('./skills/bow/rainOfArrows.js'));
await test('PoisonArrow',   () => import('./skills/bow/poisonArrow.js'));
await test('BackStep',      () => import('./skills/bow/backStep.js'));
await test('SkillData',     () => import('./core/skillData.js'));
await test('Progression',   () => import('./core/progression.js'));
await test('SkillSystem',   () => import('./core/skillSystem.js'));
await test('SkillBar',      () => import('./ui/skillBar.js'));

// ── Instancia real ──
await test('SkillBar katana', async () => {
  const { SkillSystem }  = await import('./core/skillSystem.js');
  const { Progression }  = await import('./core/progression.js');
  const { SkillBar }     = await import('./ui/skillBar.js');
  const { Scene, Group } = await import('three');

  const scene  = new Scene();
  const player = new Group();
  const skills = new SkillSystem(scene, player);
  const prog   = new Progression();
  const bar    = new SkillBar(skills, prog);
  bar.setWeapon('katana');
  bar.show();
  const activeSkills = prog.getActiveSkills('katana');
  results.push(`  → botones: ${bar._buttons.length}`);
  results.push(`  → skills activas: ${activeSkills.map(s => s.id).join(', ')}`);
  results.push(`  → disponibles: ${activeSkills.filter(s => s.available).map(s => s.id).join(', ')}`);
  render();
});

// ── Cast real ──
await test('Cast fireball', async () => {
  const { SkillSystem }  = await import('./core/skillSystem.js');
  const { Scene, Group } = await import('three');
  const scene  = new Scene();
  const player = new Group();
  player.position.set(0, 0, 0);
  const skills = new SkillSystem(scene, player);
  skills.registerEnemies([]);
  const ok = skills.castSkill('fireball');
  results.push(`  → cast sin enemigos: ${ok}`);
  render();
});

  skills.energy = 100;
  const ok = skills.castSkill('cleave');

});
