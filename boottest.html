<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Boot Test</title>
  <style>
    body { background:#0a0a10; color:#ccc; font-family:monospace; padding:20px; font-size:12px; }
    .ok  { color:#44ff88; }
    .err { color:#ff4444; }
  </style>
</head>
<body>
<h2 style="color:#C9A84C">Boot Test</h2>
<div id="out"></div>
<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>
<script type="module">
const out = document.getElementById('out');
const log = (msg, ok=true) => {
  const d = document.createElement('div');
  d.innerHTML = `<span class="${ok?'ok':'err'}">${ok?'✅':'❌'}</span> ${msg}`;
  out.appendChild(d);
};

window.addEventListener('unhandledrejection', e => {
  log('UNHANDLED: ' + (e.reason?.message || e.reason) + ' — ' + (e.reason?.stack||'').split('\n')[1], false);
});

const steps = [
  ['scene.js',       () => import('./core/scene.js')],
  ['loop.js',        () => import('./core/loop.js')],
  ['combat.js',      () => import('./core/combat.js')],
  ['enemy.js',       () => import('./core/enemy.js')],
  ['hud.js',         () => import('./ui/hud.js')],
  ['skillSystem.js', () => import('./core/skillSystem.js')],
  ['npc.js',         () => import('./core/npc.js')],
  ['partyManager.js',() => import('./core/partyManager.js')],
  ['DungeonManager', () => import('./core/dungeons/DungeonManager.js')],
  ['worldLOD.js',    () => import('./core/worldLOD.js')],
];

for (const [name, fn] of steps) {
  try {
    await fn();
    log(name);
  } catch(e) {
    log(name + ' — ' + e.message + ' (' + (e.stack||'').split('\n')[1]?.trim() + ')', false);
    break;
  }
}
log('FIN');
</script>
</body>
</html>
