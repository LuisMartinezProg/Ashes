<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Skill Import Test</title>
  <style>
    body { background: #0a0a10; color: #ccc; font-family: monospace; padding: 20px; }
    h2 { color: #C9A84C; margin-bottom: 16px; }
    .ok  { color: #44ff88; }
    .err { color: #ff4444; }
    .mod { margin: 4px 0; font-size: 13px; }
  </style>
</head>
<body>
<h2>🏹 Skill Import Test — Ashes of the Reborn</h2>
<div id="out"></div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
const modules = [
  // Magia
  ['Fireball',        '../skills/fireball.js'],
  ['IceShard',        '../skills/iceShard.js'],
  ['WindGust',        '../skills/windGust.js'],
  ['ThornShot',       '../skills/thornShot.js'],
  // Katana
  ['QuickSlash',      '../skills/katana/quickSlash.js'],
  ['FlashStep',       '../skills/katana/flashStep.js'],
  ['BladeDance',      '../skills/katana/bladeDance.js'],
  ['ThousandCuts',    '../skills/katana/thousandCuts.js'],
  ['ShadowSlash',     '../skills/katana/shadowSlash.js'],
  ['Nightfall',       '../skills/katana/nightfall.js'],
  ['VoidStep',        '../skills/katana/voidStep.js'],
  ['ShadowRealm',     '../skills/katana/shadowRealm.js'],
  ['ThunderSlash',    '../skills/katana/thunderSlash.js'],
  ['StaticField',     '../skills/katana/staticField.js'],
  ['ThunderStorm',    '../skills/katana/thunderStorm.js'],
  ['GodOfThunder',    '../skills/katana/godOfThunder.js'],
  ['LastStand',       '../skills/katana/lastStand.js'],
  ['Martyr',          '../skills/katana/martyr.js'],
  ['SacredBlade',     '../skills/katana/sacredBlade.js'],
  ['LegendaryStand',  '../skills/katana/legendaryStand.js'],
  // Espada
  ['Cleave',          '../skills/sword/cleave.js'],
  ['ShieldBash',      '../skills/sword/shieldBash.js'],
  ['WarCry',          '../skills/sword/warCry.js'],
  ['Execute',         '../skills/sword/execute.js'],
  // Arco — Precisión
  ['PiercingShot',    '../skills/bow/piercingShot.js'],
  ['Snipe',           '../skills/bow/snipe.js'],
  ['Bullseye',        '../skills/bow/bullseye.js'],
  ['DivineArrow',     '../skills/bow/divineArrow.js'],
  // Arco — Veneno
  ['PoisonArrow',     '../skills/bow/poisonArrow.js'],
  ['PlagueShot',      '../skills/bow/plagueShot.js'],
  ['ToxicCloud',      '../skills/bow/toxicCloud.js'],
  ['DeathPlague',     '../skills/bow/deathPlague.js'],
  // Arco — Lluvia
  ['RainOfArrows',    '../skills/bow/rainOfArrows.js'],
  ['StormVolley',     '../skills/bow/stormVolley.js'],
  ['ArrowStorm',      '../skills/bow/arrowStorm.js'],
  ['SkyCollapse',     '../skills/bow/skyCollapse.js'],
  // Arco — Agilidad
  ['BackStep',        '../skills/bow/backStep.js'],
  ['RollShot',        '../skills/bow/rollShot.js'],
  ['PhantomStep',     '../skills/bow/phantomStep.js'],
  ['VoidDance',       '../skills/bow/voidDance.js'],
];

const out = document.getElementById('out');
let ok = 0, fail = 0;

for (const [name, path] of modules) {
  const div = document.createElement('div');
  div.className = 'mod';
  try {
    await import(path);
    div.innerHTML = `<span class="ok">✅ ${name}</span> <span style="color:#555">${path}</span>`;
    ok++;
  } catch(e) {
    div.innerHTML = `<span class="err">❌ ${name}</span> <span style="color:#555">${path}</span> — <span style="color:#ff6666">${e.message}</span>`;
    fail++;
  }
  out.appendChild(div);
}

const summary = document.createElement('div');
summary.style.cssText = 'margin-top:20px;font-size:14px;border-top:1px solid #333;padding-top:12px;';
summary.innerHTML = `<span class="ok">✅ ${ok} OK</span> &nbsp; <span class="err">❌ ${fail} ERRORES</span>`;
out.appendChild(summary);
</script>
</body>
</html>
