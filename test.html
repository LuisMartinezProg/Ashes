<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Skill Import Test</title>
  <style>
    body { background: #0a0a10; color: #ccc; font-family: monospace; padding: 20px; }
    h2 { color: #C9A84C; margin-bottom: 16px; }
    .ok  { color: #44ff88; }
    .err { color: #ff4444; }
    .mod { margin: 4px 0; font-size: 13px; }
  </style>
</head>
<body>
<h2>🏹 Skill Import Test — Ashes of the Reborn</h2>
<div id="out"></div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
const modules = [
  ['Fireball',        '/Ashes/skills/fireball.js'],
  ['IceShard',        '/Ashes/skills/iceShard.js'],
  ['WindGust',        '/Ashes/skills/windGust.js'],
  ['ThornShot',       '/Ashes/skills/thornShot.js'],
  ['QuickSlash',      '/Ashes/skills/katana/quickSlash.js'],
  ['FlashStep',       '/Ashes/skills/katana/flashStep.js'],
  ['BladeDance',      '/Ashes/skills/katana/bladeDance.js'],
  ['ThousandCuts',    '/Ashes/skills/katana/thousandCuts.js'],
  ['ShadowSlash',     '/Ashes/skills/katana/shadowSlash.js'],
  ['Nightfall',       '/Ashes/skills/katana/nightfall.js'],
  ['VoidStep',        '/Ashes/skills/katana/voidStep.js'],
  ['ShadowRealm',     '/Ashes/skills/katana/shadowRealm.js'],
  ['ThunderSlash',    '/Ashes/skills/katana/thunderSlash.js'],
  ['StaticField',     '/Ashes/skills/katana/staticField.js'],
  ['ThunderStorm',    '/Ashes/skills/katana/thunderStorm.js'],
  ['GodOfThunder',    '/Ashes/skills/katana/godOfThunder.js'],
  ['LastStand',       '/Ashes/skills/katana/lastStand.js'],
  ['Martyr',          '/Ashes/skills/katana/martyr.js'],
  ['SacredBlade',     '/Ashes/skills/katana/sacredBlade.js'],
  ['LegendaryStand',  '/Ashes/skills/katana/legendaryStand.js'],
  ['Cleave',          '/Ashes/skills/sword/cleave.js'],
  ['ShieldBash',      '/Ashes/skills/sword/shieldBash.js'],
  ['WarCry',          '/Ashes/skills/sword/warCry.js'],
  ['Execute',         '/Ashes/skills/sword/execute.js'],
  ['PiercingShot',    '/Ashes/skills/bow/piercingShot.js'],
  ['Snipe',           '/Ashes/skills/bow/snipe.js'],
  ['Bullseye',        '/Ashes/skills/bow/bullseye.js'],
  ['DivineArrow',     '/Ashes/skills/bow/divineArrow.js'],
  ['PoisonArrow',     '/Ashes/skills/bow/poisonArrow.js'],
  ['PlagueShot',      '/Ashes/skills/bow/plagueShot.js'],
  ['ToxicCloud',      '/Ashes/skills/bow/toxicCloud.js'],
  ['DeathPlague',     '/Ashes/skills/bow/deathPlague.js'],
  ['RainOfArrows',    '/Ashes/skills/bow/rainOfArrows.js'],
  ['StormVolley',     '/Ashes/skills/bow/stormVolley.js'],
  ['ArrowStorm',      '/Ashes/skills/bow/arrowStorm.js'],
  ['SkyCollapse',     '/Ashes/skills/bow/skyCollapse.js'],
  ['BackStep',        '/Ashes/skills/bow/backStep.js'],
  ['RollShot',        '/Ashes/skills/bow/rollShot.js'],
  ['PhantomStep',     '/Ashes/skills/bow/phantomStep.js'],
  ['VoidDance',       '/Ashes/skills/bow/voidDance.js'],
];

const out = document.getElementById('out');
let ok = 0, fail = 0;

for (const [name, path] of modules) {
  const div = document.createElement('div');
  div.className = 'mod';
  try {
    await import(path);
    div.innerHTML = `<span class="ok">✅ ${name}</span> <span style="color:#555">${path}</span>`;
    ok++;
  } catch(e) {
    div.innerHTML = `<span class="err">❌ ${name}</span> <span style="color:#555">${path}</span> — <span style="color:#ff6666">${e.message}</span>`;
    fail++;
  }
  out.appendChild(div);
}

const summary = document.createElement('div');
summary.style.cssText = 'margin-top:20px;font-size:14px;border-top:1px solid #333;padding-top:12px;';
summary.innerHTML = `<span class="ok">✅ ${ok} OK</span> &nbsp; <span class="err">❌ ${fail} ERRORES</span>`;
out.appendChild(summary);
</script>
</body>
</html>
